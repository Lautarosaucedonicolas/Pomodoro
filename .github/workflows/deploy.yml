name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Armar sitio estático
        run: |
          mkdir -p _site
          cp -r public/. _site/
          cp public/app.html _site/index.html      # Pages sirve index.html
          rm -f _site/index.php                     # es un sitio estático, sin PHP
          mkdir -p _site/data
          cp data/levels.json _site/data/levels.json
          touch _site/.nojekyll                     # sin procesamiento Jekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
